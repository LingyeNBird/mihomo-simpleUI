services:
  app:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.app
    environment:
      APP_LISTEN_ADDR: :${APP_PORT:-8080}
      APP_DATA_DIR: /app/data
      APP_CONFIG_DIR: /config
      APP_SUBSCRIPTIONS_DIR: /config/subscriptions
      APP_GENERATED_CONFIG_PATH: /config/config.yaml
      APP_DB_PATH: /app/data/db/app.db
      APP_STATIC_DIR: /app/static
      MIHOMO_CONTROLLER_URL: http://mihomo:${MIHOMO_CONTROLLER_PORT:-9090}
      MIHOMO_SECRET: ${MIHOMO_SECRET:-change-me}
      MIHOMO_MIXED_PORT: ${MIHOMO_MIXED_PORT:-7890}
      MIHOMO_EXTERNAL_PORT: ${MIHOMO_CONTROLLER_PORT:-9090}
    ports:
      - "${APP_PORT:-8080}:${APP_PORT:-8080}"
    volumes:
      - ../data/config:/config
      - ../data/db:/app/data/db
    depends_on:
      - mihomo

  mihomo:
    image: metacubex/mihomo:latest
    command: ["-d", "/config", "-f", "/config/config.yaml"]
    environment:
      MIHOMO_SECRET: ${MIHOMO_SECRET:-change-me}
    ports:
      - "${MIHOMO_MIXED_PORT:-7890}:${MIHOMO_MIXED_PORT:-7890}"
      - "${MIHOMO_CONTROLLER_PORT:-9090}:${MIHOMO_CONTROLLER_PORT:-9090}"
    volumes:
      - ../data/config:/config
